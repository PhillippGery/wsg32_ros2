# wsg32_params.yaml
# -----------------
# Parameters for the WSG 32 ROS2 driver node.
# Load with: ros2 run wsg32_driver wsg32_node --ros-args --params-file <path>
# Or use the launch file, which loads this automatically.

wsg32_node:
  ros__parameters:

    # ── Network ───────────────────────────────────────────────────────────
    # IP of the gripper on the ghost subnet (192.168.1.X)
    # Right gripper: 192.168.1.201
    # Left gripper:  192.168.1.202
    gripper_ip:   "192.168.1.201"
    gripper_port: 1000

    # ── Identity ──────────────────────────────────────────────────────────
    # Used as the joint name in JointState messages.
    # Change to wsg32_right for the second arm.
    gripper_name: "wsg32_left"

    # ── Motion limits ─────────────────────────────────────────────────────
    # WSG 32 stroke = 55 mm (each jaw travels ~27.5 mm from center).
    # Double-check on your unit: Settings → System Info in web UI.
    max_pos_mm: 67.0

    # ── Deadband ──────────────────────────────────────────────────────────
    # Ignore MOVE commands smaller than this (mm).
    # Prevents TCP spam from GELLO encoder jitter.
    # Streaming suppression now lives in the driver. Keep this at 0.5 mm for
    # compatibility with existing launch files and downstream tooling.
    cmd_deadband_mm: 0.5

    # ── Publishing ────────────────────────────────────────────────────────
    # Rate at which ~/joint_state is published (Hz).
    # Match your UR5e RTDE rate for synchronized rosbag2 recording.
    # Also sets the cmd_measure.lua read / command loop frequency.
    publish_hz: 50.0

    # ── State feedback ────────────────────────────────────────────────────
    # True  → publish MEASURED jaw position/velocity/force from GETSTATE polling.
    #         Uses a dedicated second TCP connection so commands are never blocked.
    #         Falls back to commanded position if feedback becomes stale.
    # False → publish last COMMANDED position only (no second TCP connection).
    #         Use this if your firmware does not support multiple simultaneous clients.
    use_feedback: true